version = 1
name = "M_twitch"

[setup]
script = '''
$ErrorActionPreference = "Stop"

if ($env:CODEX_WORKTREE_PATH) {
  Set-Location $env:CODEX_WORKTREE_PATH
}

$jdk = "C:\Program Files\Eclipse Adoptium\jdk-17.0.18.8-hotspot"
